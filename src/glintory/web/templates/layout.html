<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Glintory{% endblock %}</title>
    <link rel="stylesheet" href="{{ url_for('static', path='css/style.css') }}">
</head>
<body>
    <nav class="main-nav">
        <div class="nav-container">
            <a href="/" class="nav-brand">Glintory</a>
            <div class="nav-links">
                <a href="/" class="nav-link {% if request.url.path == '/' %}active{% endif %}">Today</a>
                <a href="/signals" class="nav-link {% if request.url.path.startswith('/signals') %}active{% endif %}">Signals</a>
                <a href="/opportunities" class="nav-link {% if request.url.path.startswith('/opportunities') %}active{% endif %}">Opportunities</a>
                <a href="/watchlist" class="nav-link {% if request.url.path == '/watchlist' %}active{% endif %}">Watchlist</a>
                <a href="/sources" class="nav-link {% if request.url.path.startswith('/sources') or request.url.path.startswith('/collection-runs') %}active{% endif %}">Sources</a>
                <a href="/schedules" class="nav-link {% if request.url.path.startswith('/schedules') %}active{% endif %}">Schedules</a>
                <a href="/schedule-executions" class="nav-link {% if request.url.path.startswith('/schedule-executions') %}active{% endif %}">Executions</a>
            </div>
        </div>
    </nav>
    <div class="container">
        {% block content %}{% endblock %}
    </div>
</body>

</html>
