# compose.yaml
services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      - PORT=8000
      - GLINTORY_DATABASE_URL=sqlite:////data/glintory.sqlite3
    volumes:
      - glintory-data:/data
    restart: unless-stopped

  scheduler:
    build:
      context: .
      dockerfile: Dockerfile
    command: ["glintory", "scheduler", "run"]
    environment:
      - GLINTORY_DATABASE_URL=sqlite:////data/glintory.sqlite3
    volumes:
      - glintory-data:/data
    profiles:
      - scheduler
    restart: unless-stopped

volumes:
  glintory-data:
