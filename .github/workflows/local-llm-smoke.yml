name: Local LLM Enrichment Smoke Test

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  smoke-test:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      GLINTORY_DATABASE_URL: sqlite:///.state/public-glintory.sqlite3
      GLINTORY_LOCAL_LLM_ENABLED: "true"
      GLINTORY_LOCAL_LLM_MODEL_REPO: "Qwen/Qwen3-1.7B-GGUF"
      GLINTORY_LOCAL_LLM_MODEL_FILE: "Qwen3-1.7B-Q8_0.gguf"
      GLINTORY_LOCAL_LLM_MODEL_PATH: "./models/Qwen3-1.7B-Q8_0.gguf"
      GLINTORY_LOCAL_LLM_MODEL_REVISION: "90862c4b9d2787eaed51d12237eafdfe7c5f6077"
      GLINTORY_LOCAL_LLM_MODEL_SHA256: "061b54daade076b5d3362dac252678d17da8c68f07560be70818cace6590cb1a"
      GLINTORY_LOCAL_LLM_BINARY_PATH: "./bin/llama-server"
      LLAMA_CPP_VERSION: "b5092"
      LLAMA_CPP_BINARY_SHA256: "f7396752344cc252f57339ad62912a79559b3dd8c80b0c2d49cce0a6fb6ca41e"
      LLAMA_CPP_COMMIT: "d3bd7193ba66c15963fd1c59448f22019a8caf6e"
      LLAMA_CPP_ARCHIVE_SHA256: "36663ade5c921c51f95bb9bd4107752de8d036b24ffef482ac6507a4e1abf0e5"
      GLINTORY_LOCAL_LLM_RUNTIME_VERSION: "b5092"
      GLINTORY_LOCAL_LLM_RUNTIME_COMMIT: "d3bd7193ba66c15963fd1c59448f22019a8caf6e"
      GLINTORY_LOCAL_LLM_BINARY_SHA256: "f7396752344cc252f57339ad62912a79559b3dd8c80b0c2d49cce0a6fb6ca41e"
      GLINTORY_LOCAL_LLM_ARCHIVE_SHA256: "36663ade5c921c51f95bb9bd4107752de8d036b24ffef482ac6507a4e1abf0e5"

    steps:
      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Setup Python
        uses: actions/setup-python@39cd14951b08e74b54015e9e001cdefcf80e669f # v5.1.1
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@1edb52594c857e2b5b13128931090f0640537287 # v5.3.0
        with:
          version: "0.5.21"
          enable-cache: true

      - name: Install dependencies
        run: |
          uv sync --frozen

      - name: Cache LLM assets
        id: cache-llm
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: |
            ./bin
            ./models
          key: local-llm-${{ env.GLINTORY_LOCAL_LLM_MODEL_REPO }}-${{ env.GLINTORY_LOCAL_LLM_MODEL_REVISION }}-${{ env.GLINTORY_LOCAL_LLM_MODEL_SHA256 }}-${{ env.LLAMA_CPP_VERSION }}

      - name: Prepare and verify LLM assets
        env:
          CACHE_HIT: ${{ steps.cache-llm.outputs.cache-hit }}
        run: |
          mkdir -p bin models build
          
          # Record cache status
          if [ "$CACHE_HIT" = "true" ]; then
            echo "cache_status=Hit" >> "$GITHUB_ENV"
          else
            echo "cache_status=Miss" >> "$GITHUB_ENV"
          fi

          # 1. Check and prepare llama-server and library files
          bin_ok=false
          if [ -f "./bin/llama-server" ] && [ -f "./bin/libllama.so" ]; then
            echo "${{ env.LLAMA_CPP_BINARY_SHA256 }}  ./bin/llama-server" | sha256sum -c - --status && bin_ok=true || bin_ok=false
          fi

          if [ "$bin_ok" = "false" ]; then
            echo "Binary missing or hash mismatch. Downloading..."
            ZIP_URL="https://github.com/ggml-org/llama.cpp/releases/download/${LLAMA_CPP_VERSION}/llama-${LLAMA_CPP_VERSION}-bin-ubuntu-x64.zip"
            curl -L -o llama.zip "$ZIP_URL"
            # Verify zip archive hash
            echo "${{ env.LLAMA_CPP_ARCHIVE_SHA256 }}  llama.zip" | sha256sum -c -
            unzip -o llama.zip -d llama_temp
            find llama_temp -name "llama-server" -exec cp {} ./bin/llama-server \;
            find llama_temp -name "*.so" -exec cp {} ./bin/ \;
            chmod +x ./bin/llama-server
            rm -rf llama.zip llama_temp
            # Verify extracted binary hash
            echo "${{ env.LLAMA_CPP_BINARY_SHA256 }}  ./bin/llama-server" | sha256sum -c -
          else
            echo "Binary cached and verified successfully."
          fi

          # 2. Check and prepare Model GGUF
          model_ok=false
          if [ -f "./models/${{ env.GLINTORY_LOCAL_LLM_MODEL_FILE }}" ]; then
            echo "${{ env.GLINTORY_LOCAL_LLM_MODEL_SHA256 }}  ./models/${{ env.GLINTORY_LOCAL_LLM_MODEL_FILE }}" | sha256sum -c - --status && model_ok=true || model_ok=false
          fi

          if [ "$model_ok" = "false" ]; then
            echo "Model missing or hash mismatch. Downloading..."
            MODEL_URL="https://huggingface.co/${{ env.GLINTORY_LOCAL_LLM_MODEL_REPO }}/resolve/${{ env.GLINTORY_LOCAL_LLM_MODEL_REVISION }}/${{ env.GLINTORY_LOCAL_LLM_MODEL_FILE }}"
            curl -L -o "./models/${{ env.GLINTORY_LOCAL_LLM_MODEL_FILE }}" "$MODEL_URL"
            # Verify model hash
            echo "${{ env.GLINTORY_LOCAL_LLM_MODEL_SHA256 }}  ./models/${{ env.GLINTORY_LOCAL_LLM_MODEL_FILE }}" | sha256sum -c -
          else
            echo "Model cached and verified successfully."
          fi

      - name: Debug llama-server binary
        run: |
          chmod +x ./bin/llama-server
          ./bin/llama-server --version || true
          ldd ./bin/llama-server || true

      - name: Initialize database and setup test data
        run: |
          mkdir -p .state build
          uv run alembic upgrade head
          uv run python - << 'EOF'
          import sys
          from sqlalchemy import create_engine, inspect
          from sqlalchemy.orm import sessionmaker
          from glintory.domain.models import Source, Signal, Opportunity, OpportunitySignal, ScoreSnapshot
          from glintory.domain.enums import SignalType, OpportunityStatus, Confidence, EvidenceRelationType
          from glintory.config import settings

          db_url = settings.database_url
          engine = create_engine(db_url)
          
          # Strict check that alembic tables exist
          inspector = inspect(engine)
          existing_tables = inspector.get_table_names()
          required_tables = ["sources", "signals", "opportunities", "opportunity_signals", "score_snapshots", "opportunity_enrichments", "opportunity_enrichment_localizations"]
          for t in required_tables:
              if t not in existing_tables:
                  sys.stderr.write(f"Schema verification failed: missing table '{t}'\n")
                  sys.exit(1)

          Session = sessionmaker(bind=engine)
          session = Session()

          src = Source(id="smoke_src", name="Smoke Source", source_type="github")
          session.add(src)
          session.flush()

          sig = Signal(
              id="smoke_sig",
              source_id=src.id,
              canonical_url="https://github.com/smoke/test",
              title="Smoke Signal Title",
              excerpt="This is user feedback indicating a major feature request for integration.",
              signal_type=SignalType.PAIN,
              content_hash="smoke_content_hash",
              freshness_score=1.0,
              source_quality_score=1.0,
          )
          session.add(sig)
          session.flush()

          opp = Opportunity(
              id="smoke_opp",
              title="Smoke Opportunity",
              proposed_solution="Integrate the requested feature.",
              evidence_score=10,
              feasibility_score=10,
              penalty_score=0,
              total_score=20,
              confidence=Confidence.MEDIUM,
              status=OpportunityStatus.INBOX,
          )
          session.add(opp)
          session.flush()

          opp_sig = OpportunitySignal(
              opportunity_id=opp.id,
              signal_id=sig.id,
              relation_type=EvidenceRelationType.SUPPORTING,
              relevance_score=1.0,
          )
          session.add(opp_sig)

          snap = ScoreSnapshot(
              opportunity_id=opp.id,
              evidence_score=10,
              feasibility_score=10,
              penalty_score=0,
              total_score=20,
              confidence=Confidence.MEDIUM,
              scoring_version=settings.scoring_version,
              input_hash="smoke_snap_hash",
          )
          session.add(snap)
          session.commit()
          session.close()
          print("Smoke test data initialized successfully.")
          EOF

      - name: Run LLM Enrichment Smoke Test
        run: |
          mkdir -p build
          
          # Clean up stop file and old monitor results
          rm -f /tmp/monitor_stop || true
          rm -f build/peak_rss.txt || true
          rm -f build/rss_sample_count.txt || true
          
          # Peak RSS monitor background thread
          (
            peak=0
            sample_count=0
            while true; do
              # Use pgrep -n -x with '|| true' to avoid pipeline failure, targeting single process
              pid=$(pgrep -n -x llama-server || true)
              if [ -n "$pid" ]; then
                rss=$(ps -o rss= -p "$pid" | tr -d ' ' || true)
                if [ -n "$rss" ]; then
                  if [ "$rss" -eq "$rss" ] 2>/dev/null; then
                    sample_count=$((sample_count + 1))
                    if [ "$rss" -gt "$peak" ]; then
                      peak=$rss
                    fi
                  fi
                fi
              fi
              sleep 0.1
              if [ -f "/tmp/monitor_stop" ]; then
                echo "$peak" > build/peak_rss.txt
                echo "$sample_count" > build/rss_sample_count.txt
                break
              fi
            done
          ) &
          MONITOR_PID=$!
          
          CLEANED_UP=0
          cleanup() {
            if [ "$CLEANED_UP" -eq 0 ]; then
              CLEANED_UP=1
              trap - EXIT INT TERM
              touch /tmp/monitor_stop || true
              if [ -n "$MONITOR_PID" ]; then
                wait "$MONITOR_PID" || true
              fi
            fi
          }
          trap cleanup EXIT INT TERM
          
          set +e
          
          # Run Smoke CLI under require-all-success
          uv run glintory enrich run \
            --opportunity smoke_opp \
            --max-opportunities 1 \
            --require-all-success \
            --json \
            > build/llm-smoke-result.json \
            2> build/llm-smoke-error.log
          
          cli_status=$?
          set -e

          echo "$cli_status" > build/cli_exit_code.txt
          
          cleanup
          exit "$cli_status"

      - name: Assert JSON Results
        run: |
          uv run python - << 'EOF'
          import json
          import os
          import sys

          # Read exit code
          cli_exit = 1
          if os.path.exists("build/cli_exit_code.txt"):
              try:
                  with open("build/cli_exit_code.txt") as f:
                      cli_exit = int(f.read().strip() or "1")
              except Exception:
                  pass

          # Load results
          json_data = {}
          result_valid = True
          try:
              with open("build/llm-smoke-result.json") as f:
                  json_data = json.load(f)
          except Exception:
              result_valid = False

          # Check assertions
          assertions_passed = True
          if not result_valid:
              assertions_passed = False
          else:
              if json_data.get("selected_count") != 1: assertions_passed = False
              if json_data.get("succeeded_count") != 1: assertions_passed = False
              if json_data.get("failed_count") != 0: assertions_passed = False
              if json_data.get("operational_status") != "success": assertions_passed = False

          # Assert rss sample count
          rss_sample_count = 0
          if os.path.exists("build/rss_sample_count.txt"):
              try:
                  with open("build/rss_sample_count.txt") as f:
                      rss_sample_count = int(f.read().strip() or "0")
              except Exception:
                  pass
          if rss_sample_count <= 0:
              assertions_passed = False

          # If failed, print safe metadata and exit 1
          if cli_exit != 0 or not assertions_passed:
              sys.stderr.write("=== SMOKE TEST FAILURE DIAGNOSTICS ===\n")
              sys.stderr.write("CLI_ERROR_OCCURRED\n")
              sys.stderr.write(f"CLI exit code: {cli_exit}\n")
              
              # Get llama-server log file size
              log_size = 0
              if os.path.exists("build/llama_server.log"):
                  log_size = os.path.getsize("build/llama_server.log")
              sys.stderr.write(f"llama-server log file size: {log_size} bytes\n")
              
              # Runtime version from settings
              from glintory.config import settings
              sys.stderr.write(f"runtime version: {settings.local_llm_runtime_version}\n")
              
              measurement_status = "observed" if rss_sample_count > 0 else "not_observed"
              sys.stderr.write(f"measurement status: {measurement_status}\n")
              sys.stderr.write("======================================\n")
              sys.exit(1)

          print("JSON results and RSS sample count assertions passed.")
          EOF

      - name: Verify DB State and Generate Summary
        run: |
          uv run python - << 'EOF'
          import json
          import os
          import sys
          from sqlalchemy import create_engine
          from sqlalchemy.orm import sessionmaker
          from glintory.domain.models import OpportunityEnrichment, OpportunityEnrichmentLocalization
          from glintory.config import settings
          from glintory.domain.enrichment_contract import PROMPT_VERSION

          db_url = settings.database_url
          engine = create_engine(db_url)
          Session = sessionmaker(bind=engine)
          session = Session()

          # Fetch latest enrichment
          enrichment = (
              session.query(OpportunityEnrichment)
              .filter(OpportunityEnrichment.opportunity_id == "smoke_opp")
              .order_by(OpportunityEnrichment.completed_at.desc())
              .first()
          )

          if not enrichment:
              sys.stderr.write("Verification failed: enrichment not found in DB\n")
              sys.exit(1)

          if enrichment.status != "succeeded":
              sys.stderr.write(f"Verification failed: expected status 'succeeded', got '{enrichment.status}'\n")
              sys.exit(1)

          # Smoke environment verification (assert audit fields match env variables exactly)
          expected_commit = os.environ.get("GLINTORY_LOCAL_LLM_RUNTIME_COMMIT")
          expected_bin_sha = os.environ.get("GLINTORY_LOCAL_LLM_BINARY_SHA256")
          expected_model_rev = os.environ.get("GLINTORY_LOCAL_LLM_MODEL_REVISION")
          expected_model_sha = os.environ.get("GLINTORY_LOCAL_LLM_MODEL_SHA256")
          
          if enrichment.runtime_commit != expected_commit:
              sys.stderr.write(f"Verification failed: expected runtime_commit '{expected_commit}', got '{enrichment.runtime_commit}'\n")
              sys.exit(1)
          if enrichment.runtime_binary_sha256 != expected_bin_sha:
              sys.stderr.write(f"Verification failed: expected runtime_binary_sha256 '{expected_bin_sha}', got '{enrichment.runtime_binary_sha256}'\n")
              sys.exit(1)
          if enrichment.model_revision != expected_model_rev:
              sys.stderr.write(f"Verification failed: expected model_revision '{expected_model_rev}', got '{enrichment.model_revision}'\n")
              sys.exit(1)
          if enrichment.model_sha256 != expected_model_sha:
              sys.stderr.write(f"Verification failed: expected model_sha256 '{expected_model_sha}', got '{enrichment.model_sha256}'\n")
              sys.exit(1)
          if enrichment.prompt_version != PROMPT_VERSION:
              sys.stderr.write(f"Verification failed: expected prompt_version '{PROMPT_VERSION}', got '{enrichment.prompt_version}'\n")
              sys.exit(1)

          if "smoke_sig" not in enrichment.evidence_refs:
              sys.stderr.write("Verification failed: 'smoke_sig' missing from evidence_refs\n")
              sys.exit(1)

          if enrichment.llm_confidence not in ("low", "medium", "high"):
              sys.stderr.write(f"Verification failed: invalid llm_confidence: {enrichment.llm_confidence}\n")
              sys.exit(1)

          if enrichment.runtime_version == "unknown" or not enrichment.runtime_version:
              sys.stderr.write("Verification failed: runtime_version is unknown\n")
              sys.exit(1)

          # Fetch localizations
          en_loc = (
              session.query(OpportunityEnrichmentLocalization)
              .filter(
                  OpportunityEnrichmentLocalization.enrichment_id == enrichment.id,
                  OpportunityEnrichmentLocalization.locale == "en",
              )
              .first()
          )
          ja_loc = (
              session.query(OpportunityEnrichmentLocalization)
              .filter(
                  OpportunityEnrichmentLocalization.enrichment_id == enrichment.id,
                  OpportunityEnrichmentLocalization.locale == "ja",
              )
              .first()
          )

          if not en_loc:
              sys.stderr.write("Verification failed: English localization missing\n")
              sys.exit(1)

          if not ja_loc:
              sys.stderr.write("Verification failed: Japanese localization missing\n")
              sys.exit(1)

          session.close()

          # Output verification status and titles/summaries to temp file
          summary_data = {
              "en_title": en_loc.generated_title,
              "en_summary": en_loc.generated_summary,
              "ja_title": ja_loc.generated_title,
              "ja_summary": ja_loc.generated_summary,
              "inference_duration": enrichment.duration_ms,
              "runtime_version": enrichment.runtime_version,
          }
          with open("build/db_summary.json", "w") as f:
              json.dump(summary_data, f)

          # Read peak rss and sample count
          peak_rss_kb = 0
          if os.path.exists("build/peak_rss.txt"):
              try:
                  with open("build/peak_rss.txt") as f:
                      peak_rss_kb = int(f.read().strip() or "0")
              except Exception:
                  pass

          rss_sample_count = 0
          if os.path.exists("build/rss_sample_count.txt"):
              try:
                  with open("build/rss_sample_count.txt") as f:
                      rss_sample_count = int(f.read().strip() or "0")
              except Exception:
                  pass

          # Read CLI result.json
          cli_results = {}
          if os.path.exists("build/llm-smoke-result.json"):
              try:
                  with open("build/llm-smoke-result.json") as f:
                      cli_results = json.load(f)
              except Exception:
                  pass

          # Read cli_exit_code.txt
          cli_exit_code = 1
          if os.path.exists("build/cli_exit_code.txt"):
              try:
                  with open("build/cli_exit_code.txt") as f:
                      cli_exit_code = int(f.read().strip() or "1")
              except Exception:
                  pass

          conformance_report = {
              "source_commit": os.environ.get("GITHUB_SHA") or "",
              "workflow_status": "success" if cli_exit_code == 0 else "failed",
              "cli_exit_code": cli_exit_code,
              "operational_status": cli_results.get("operational_status", "failed"),
              "selected_count": cli_results.get("selected_count", 0),
              "succeeded_count": cli_results.get("succeeded_count", 0),
              "failed_count": cli_results.get("failed_count", 0),
              "schema_validation": "passed",
              "result_json_validation": "passed",
              "runtime_version": enrichment.runtime_version,
              "runtime_commit": enrichment.runtime_commit,
              "runtime_binary_sha256": enrichment.runtime_binary_sha256,
              "model_revision": enrichment.model_revision,
              "model_sha256": enrichment.model_sha256,
              "prompt_version": enrichment.prompt_version,
              "rss_sample_count": rss_sample_count,
              "peak_rss_kb": peak_rss_kb,
              "peak_rss_mb": round(peak_rss_kb / 1024.0, 2),
              "inference_duration_ms": enrichment.duration_ms
          }

          with open("build/conformance-report.json", "w") as f:
              json.dump(conformance_report, f, indent=2)

          print("Database verification passed.")
          EOF
          
          # Write schema validation success indicator
          echo "passed" > build/schema_validation.txt

      - name: Write Actions Step Summary
        if: always()
        run: |
          uv run python - << 'EOF'
          import json
          import os
          import sys
          import html

          # Validate result_json
          json_ok = True
          report = {}
          try:
              if not os.path.exists("build/conformance-report.json"):
                  json_ok = False
              else:
                  with open("build/conformance-report.json") as f:
                      report = json.load(f)
                  
                  # Strict type checking
                  required_keys = [
                      "source_commit", "workflow_status", "cli_exit_code", 
                      "operational_status", "selected_count", "succeeded_count", 
                      "failed_count", "schema_validation", "result_json_validation", 
                      "runtime_version", "runtime_commit", "runtime_binary_sha256", 
                      "model_revision", "model_sha256", "prompt_version", 
                      "rss_sample_count", "peak_rss_kb", "peak_rss_mb", 
                      "inference_duration_ms"
                  ]
                  for k in required_keys:
                      if k not in report:
                          json_ok = False
                          break
                      
                  # Type assertions
                  if not isinstance(report.get("selected_count"), int): json_ok = False
                  if not isinstance(report.get("succeeded_count"), int): json_ok = False
                  if not isinstance(report.get("failed_count"), int): json_ok = False
                  if not isinstance(report.get("cli_exit_code"), int): json_ok = False
                  if not isinstance(report.get("rss_sample_count"), int): json_ok = False
                  if not isinstance(report.get("peak_rss_kb"), int): json_ok = False
                  if not isinstance(report.get("peak_rss_mb"), (int, float)): json_ok = False
                  if not isinstance(report.get("inference_duration_ms"), int): json_ok = False
          except Exception:
              json_ok = False

          summary_file = os.environ.get("GITHUB_STEP_SUMMARY")
          if not summary_file:
              sys.exit(0)

          with open(summary_file, "a", encoding="utf-8") as sf:
              if not json_ok:
                  sf.write("### 🚀 Local LLM Conformance Smoke Test Results\n\n")
                  sf.write("result_json_validation=failed\n")
                  sf.write("workflow_status=Failed\n")
                  sys.exit(0)

              # Output conformance report table
              sf.write("### 🚀 Local LLM Conformance Smoke Test Results\n\n")
              sf.write("| Metric | Value |\n")
              sf.write("| --- | --- |\n")
              sf.write(f"| Workflow Status | **{report['workflow_status'].capitalize()}** |\n")
              sf.write(f"| CLI Exit Code | `{report['cli_exit_code']}` |\n")
              sf.write(f"| Operational Status | `{report['operational_status']}` |\n")
              sf.write(f"| Selected Count | {report['selected_count']} |\n")
              sf.write(f"| Succeeded Count | {report['succeeded_count']} |\n")
              sf.write(f"| Failed Count | {report['failed_count']} |\n")
              sf.write(f"| Schema Validation | {report['schema_validation']} |\n")
              sf.write(f"| Runtime Version | `{report['runtime_version']}` |\n")
              sf.write(f"| Measurement Status | `observed` |\n")
              sf.write(f"| RSS Sample Count | {report['rss_sample_count']} |\n")
              sf.write(f"| Peak RSS | {report['peak_rss_mb']} MB ({report['peak_rss_kb']} KB) |\n")
              sf.write(f"| Inference Duration | {report['inference_duration_ms']} ms |\n\n")

              # Output bilingual summary with HTML escaping
              db_summary = {}
              if os.path.exists("build/db_summary.json"):
                  try:
                      with open("build/db_summary.json") as f:
                          db_summary = json.load(f)
                  except Exception:
                      pass

              en_title = html.escape(db_summary.get("en_title") or "")
              en_summary = html.escape(db_summary.get("en_summary") or "")
              ja_title = html.escape(db_summary.get("ja_title") or "")
              ja_summary = html.escape(db_summary.get("ja_summary") or "")

              sf.write("#### 📝 BILINGUAL SUMMARY PREVIEW\n\n")
              sf.write("**English Title:**\n")
              sf.write(f"<pre>{en_title}</pre>\n\n")
              sf.write("**English Summary:**\n")
              sf.write(f"<pre>{en_summary}</pre>\n\n")
              sf.write("**Japanese Title:**\n")
              sf.write(f"<pre>{ja_title}</pre>\n\n")
              sf.write("**Japanese Summary:**\n")
              sf.write(f"<pre>{ja_summary}</pre>\n")
          EOF

      - name: Upload Smoke Test Artifacts
        uses: actions/upload-artifact@26f96dfa697d77e81fd5907df203aa23a56210a8 # v4.3.0
        if: always()
        with:
          name: conformance-reports-${{ github.sha }}
          path: |
            build/conformance-report.json
            build/llm-smoke-result.json
            build/db_summary.json
            build/cli_exit_code.txt
            build/peak_rss.txt
            build/rss_sample_count.txt
