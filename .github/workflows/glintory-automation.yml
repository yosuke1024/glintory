name: Glintory Scheduled Automation

on:
  schedule:
    - cron: '17 21 * * *' # 日本時間 午前6時17分 (UTC 21:17)
  workflow_dispatch:

concurrency:
  group: glintory-workflow
  cancel-in-progress: false

permissions:
  contents: write
  pages: write
  id-token: write
  issues: write

jobs:
  automation:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      GLINTORY_DATABASE_URL: sqlite:///.state/public-glintory.sqlite3
      GLINTORY_GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      GLINTORY_PUBLIC_SITE_URL: ${{ vars.GLINTORY_PUBLIC_SITE_URL }}
      GLINTORY_REPOSITORY_URL: ${{ vars.GLINTORY_REPOSITORY_URL }}
      GLINTORY_PIXAPPS_URL: ${{ vars.GLINTORY_PIXAPPS_URL }}
    steps:
      - name: Checkout codebase
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Setup Python
        uses: actions/setup-python@39cd14951b08e74b54015e9e001cdefcf80e669f # v5.1.1
        with:
          python-version: '3.12'

      - name: Install uv
        run: |
          curl -LsSf https://astral.sh/uv/install.sh | sh
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Prepare directories
        run: |
          mkdir -p .state build/state dist

      - name: Install dependencies
        run: |
          uv sync --frozen

      - name: Download latest state
        run: |
          python scripts/github_state_store.py --state-dir .state --db-url "$GLINTORY_DATABASE_URL" download-latest

      - name: SQLite integrity and migration check
        run: |
          # Verify SQLite physical DB integrity
          sqlite3 .state/public-glintory.sqlite3 "PRAGMA integrity_check;"
          # Apply Alembic migrations
          uv run alembic upgrade head

      - name: Sync source manifest
        run: |
          uv run glintory source sync-manifest --file config/public-sources.json --json

      - name: Run due collection
        run: |
          uv run glintory scheduler run --once --json > build/state/scheduler_metadata.json
          cat build/state/scheduler_metadata.json

      - name: Create state snapshot and upload
        run: |
          # Under the hood, this creates snapshot -> verify -> upload -> download -> verify -> prune
          python scripts/github_state_store.py --state-dir .state --db-url "$GLINTORY_DATABASE_URL" upload-and-verify --metadata-file build/state/scheduler_metadata.json

      - name: Generate public static site
        run: |
          uv run glintory publish build \
            --output-dir dist \
            --base-path /glintory \
            --site-url "$GLINTORY_PUBLIC_SITE_URL" \
            --json

      - name: Generate GITHUB_STEP_SUMMARY
        run: |
          {
            echo "## Glintory Execution Summary"
            echo "### State Metadata"
            echo '```json'
            uv run glintory state inspect --input ".state/glintory-state-${{ github.run_id }}-${{ github.run_attempt }}.tar.gz" --json
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Configure Pages
        uses: actions/configure-pages@983d63b72ee22c1d7a854228965c3cad64654918 # v5.0.0

      - name: Upload Pages Artifact
        uses: actions/upload-pages-artifact@56afc609e74202658d3ffba0e8f6dda996908607 # v3.0.1
        with:
          path: dist

  deploy-pages:
    needs: automation
    permissions:
      pages: write
      id-token: write
      contents: read
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Deploy GitHub Pages
        id: deployment
        uses: actions/deploy-pages@d6db596a2a8849b214bea8702aa55f722ccd6dfd # v4.0.5

  notify:
    needs:
      - automation
      - deploy-pages
    if: ${{ always() }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - name: Checkout codebase
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Setup Python
        uses: actions/setup-python@39cd14951b08e74b54015e9e001cdefcf80e669f # v5.1.1
        with:
          python-version: '3.12'

      - name: Handle success notification
        if: >-
          ${{
            needs.automation.result == 'success' &&
            needs.deploy-pages.result == 'success'
          }}
        env:
          AUTOMATION_RESULT: "success"
          DEPLOY_PAGES_RESULT: "success"
        run: |
          python scripts/github_issue_notifier.py \
            --automation-result "$AUTOMATION_RESULT" \
            --deploy-pages-result "$DEPLOY_PAGES_RESULT"

      - name: Handle failure notification
        if: >-
          ${{
            needs.automation.result != 'success' ||
            needs.deploy-pages.result != 'success'
          }}
        env:
          AUTOMATION_RESULT: ${{ needs.automation.result }}
          DEPLOY_PAGES_RESULT: ${{ needs.deploy-pages.result }}
        run: |
          python scripts/github_issue_notifier.py \
            --automation-result "$AUTOMATION_RESULT" \
            --deploy-pages-result "$DEPLOY_PAGES_RESULT"
