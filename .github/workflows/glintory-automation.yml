name: Glintory Scheduled Automation

on:
  schedule:
    - cron: '17 21 * * *' # 日本時間 午前6時17分 (UTC 21:17)
  workflow_dispatch:

concurrency:
  group: glintory-workflow
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  automation:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    permissions:
      contents: write
      pages: write
      id-token: write
    env:
      GLINTORY_DATABASE_URL: sqlite:///.state/public-glintory.sqlite3
      GLINTORY_PUBLIC_SITE_URL: ${{ vars.GLINTORY_PUBLIC_SITE_URL }}
      GLINTORY_REPOSITORY_URL: ${{ vars.GLINTORY_REPOSITORY_URL }}
      GLINTORY_PIXAPPS_URL: ${{ vars.GLINTORY_PIXAPPS_URL }}
      GLINTORY_LOCAL_LLM_ENABLED: "true"
      GLINTORY_LOCAL_LLM_MODEL_REPO: "Qwen/Qwen3-1.7B-GGUF"
      GLINTORY_LOCAL_LLM_MODEL_FILE: "Qwen3-1.7B-Q8_0.gguf"
      GLINTORY_LOCAL_LLM_MODEL_PATH: "./models/Qwen3-1.7B-Q8_0.gguf"
      GLINTORY_LOCAL_LLM_MODEL_REVISION: "90862c4b9d2787eaed51d12237eafdfe7c5f6077"
      GLINTORY_LOCAL_LLM_MODEL_SHA256: "061b54daade076b5d3362dac252678d17da8c68f07560be70818cace6590cb1a"
      GLINTORY_LOCAL_LLM_BINARY_PATH: "./bin/llama-server"
      LLAMA_CPP_VERSION: "b5092"
      LLAMA_CPP_BINARY_SHA256: "f7396752344cc252f57339ad62912a79559b3dd8c80b0c2d49cce0a6fb6ca41e"
      LLAMA_CPP_COMMIT: "d3bd7193ba66c15963fd1c59448f22019a8caf6e"
      LLAMA_CPP_ARCHIVE_SHA256: "36663ade5c921c51f95bb9bd4107752de8d036b24ffef482ac6507a4e1abf0e5"
      GLINTORY_LOCAL_LLM_RUNTIME_VERSION: "b5092"
      GLINTORY_LOCAL_LLM_RUNTIME_COMMIT: "d3bd7193ba66c15963fd1c59448f22019a8caf6e"
      GLINTORY_LOCAL_LLM_BINARY_SHA256: "f7396752344cc252f57339ad62912a79559b3dd8c80b0c2d49cce0a6fb6ca41e"
      GLINTORY_LOCAL_LLM_ARCHIVE_SHA256: "36663ade5c921c51f95bb9bd4107752de8d036b24ffef482ac6507a4e1abf0e5"
    outputs:
      collection_exit_code: ${{ steps.collection.outputs.collection_exit_code }}
      collection_status: ${{ steps.collection.outputs.collection_status }}
      due_count: ${{ steps.collection.outputs.due_count }}
      succeeded_count: ${{ steps.collection.outputs.succeeded_count }}
      partial_count: ${{ steps.collection.outputs.partial_count }}
      failed_count: ${{ steps.collection.outputs.failed_count }}
      restored_asset_id: ${{ steps.download_state.outputs.restored_asset_id }}
      restored_asset_name: ${{ steps.download_state.outputs.restored_asset_name }}
      uploaded_asset_id: ${{ steps.upload_state.outputs.uploaded_asset_id }}
      uploaded_asset_name: ${{ steps.upload_state.outputs.uploaded_asset_name }}
      pruned_deleted_count: ${{ steps.upload_state.outputs.pruned_deleted_count }}
      prune_status: ${{ steps.upload_state.outputs.prune_status }}
      database_size: ${{ steps.upload_state.outputs.database_size }}
      source_count: ${{ steps.upload_state.outputs.source_count }}
      signal_count: ${{ steps.upload_state.outputs.signal_count }}
      opportunity_count: ${{ steps.upload_state.outputs.opportunity_count }}
      started_at: ${{ steps.start_time.outputs.started_at }}
    steps:
      - name: Record start time
        id: start_time
        run: |
          echo "started_at=$(date -u +'%Y-%m-%dT%H:%M:%SZ')" >> "$GITHUB_OUTPUT"

      - name: Checkout codebase
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Setup Python
        uses: actions/setup-python@39cd14951b08e74b54015e9e001cdefcf80e669f # v5.1.1
        with:
          python-version: '3.12'

      - name: Set up uv
        uses: astral-sh/setup-uv@1edb52594c857e2b5b13128931090f0640537287 # v5.3.0
        with:
          version: "0.5.21"

      - name: Prepare directories
        run: |
          mkdir -p .state build/state dist bin models build

      - name: Install dependencies
        run: |
          uv sync --frozen

      - name: Cache LLM assets
        id: cache-llm
        uses: actions/cache@1bd1e32a3bdc45362d1e726936510720a7c30a57 # v4.2.0
        with:
          path: |
            ./bin
            ./models
          key: local-llm-${{ env.GLINTORY_LOCAL_LLM_MODEL_REPO }}-${{ env.GLINTORY_LOCAL_LLM_MODEL_REVISION }}-${{ env.GLINTORY_LOCAL_LLM_MODEL_SHA256 }}-${{ env.LLAMA_CPP_VERSION }}

      - name: Prepare and verify LLM assets
        run: |
          # 1. Check and prepare llama-server and library files
          bin_ok=false
          if [ -f "./bin/llama-server" ] && [ -f "./bin/libllama.so" ]; then
            echo "${{ env.LLAMA_CPP_BINARY_SHA256 }}  ./bin/llama-server" | sha256sum -c - --status && bin_ok=true || bin_ok=false
          fi

          if [ "$bin_ok" = "false" ]; then
            echo "Binary missing or hash mismatch. Downloading..."
            ZIP_URL="https://github.com/ggml-org/llama.cpp/releases/download/${LLAMA_CPP_VERSION}/llama-${LLAMA_CPP_VERSION}-bin-ubuntu-x64.zip"
            curl -L -o llama.zip "$ZIP_URL"
            # Verify zip archive hash
            echo "${{ env.LLAMA_CPP_ARCHIVE_SHA256 }}  llama.zip" | sha256sum -c -
            unzip -o llama.zip -d llama_temp
            find llama_temp -name "llama-server" -exec cp {} ./bin/llama-server \;
            find llama_temp -name "*.so" -exec cp {} ./bin/ \;
            chmod +x ./bin/llama-server
            rm -rf llama.zip llama_temp
            # Verify extracted binary hash
            echo "${{ env.LLAMA_CPP_BINARY_SHA256 }}  ./bin/llama-server" | sha256sum -c -
          else
            echo "Binary cached and verified successfully."
          fi

          # 2. Check and prepare Model GGUF
          model_ok=false
          if [ -f "./models/${{ env.GLINTORY_LOCAL_LLM_MODEL_FILE }}" ]; then
            echo "${{ env.GLINTORY_LOCAL_LLM_MODEL_SHA256 }}  ./models/${{ env.GLINTORY_LOCAL_LLM_MODEL_FILE }}" | sha256sum -c - --status && model_ok=true || model_ok=false
          fi

          if [ "$model_ok" = "false" ]; then
            echo "Model missing or hash mismatch. Downloading..."
            MODEL_URL="https://huggingface.co/${{ env.GLINTORY_LOCAL_LLM_MODEL_REPO }}/resolve/${{ env.GLINTORY_LOCAL_LLM_MODEL_REVISION }}/${{ env.GLINTORY_LOCAL_LLM_MODEL_FILE }}"
            curl -L -o "./models/${{ env.GLINTORY_LOCAL_LLM_MODEL_FILE }}" "$MODEL_URL"
            # Verify model hash
            echo "${{ env.GLINTORY_LOCAL_LLM_MODEL_SHA256 }}  ./models/${{ env.GLINTORY_LOCAL_LLM_MODEL_FILE }}" | sha256sum -c -
          else
            echo "Model cached and verified successfully."
          fi

      - name: Preflight Check
        run: |
          uv run glintory publish validate-config --site-url "$GLINTORY_PUBLIC_SITE_URL"

      - name: Download latest state
        id: download_state
        run: |
          uv run python scripts/github_state_store.py --state-dir .state --db-url "$GLINTORY_DATABASE_URL" download-latest
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GLINTORY_GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: SQLite integrity and migration check
        run: |
          # Verify SQLite physical DB integrity
          sqlite3 .state/public-glintory.sqlite3 "PRAGMA integrity_check;"
          # Apply Alembic migrations
          uv run alembic upgrade head


      - name: Sync source manifest
        run: |
          uv run glintory source sync-manifest --file config/public-sources.json --json

      - name: Run due collection
        id: collection
        run: |
          set +e
          uv run glintory scheduler run --once --json > build/state/scheduler_metadata.json
          cmd_exit_code=$?
          set -e

          if [ ! -s build/state/scheduler_metadata.json ]; then
            echo "{\"exit_code\": $cmd_exit_code, \"operational_status\": \"infrastructure_failed\", \"tick\": null}" > build/state/scheduler_metadata.json
          fi

          cat build/state/scheduler_metadata.json

          exit_code=$(jq -r '.exit_code' build/state/scheduler_metadata.json)
          status=$(jq -r '.operational_status' build/state/scheduler_metadata.json)
          due_count=$(jq -r '.tick.due_schedule_count // 0' build/state/scheduler_metadata.json)
          succeeded_count=$(jq -r '.tick.succeeded_count // 0' build/state/scheduler_metadata.json)
          partial_count=$(jq -r '.tick.partial_count // 0' build/state/scheduler_metadata.json)
          failed_count=$(jq -r '.tick.failed_count // 0' build/state/scheduler_metadata.json)

          {
            echo "collection_exit_code=$exit_code"
            echo "collection_status=$status"
            echo "due_count=$due_count"
            echo "succeeded_count=$succeeded_count"
            echo "partial_count=$partial_count"
            echo "failed_count=$failed_count"
          } >> "$GITHUB_OUTPUT"

          if [ "$exit_code" = "0" ] || [ "$exit_code" = "3" ] || [ "$exit_code" = "4" ]; then
            exit 0
          else
            exit "$exit_code"
          fi
        env:
          GLINTORY_GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Deterministic opportunity analysis and scoring
        run: |
          uv run glintory analyze --json
          uv run glintory score --json

      - name: Local LLM Enrichment
        if: env.GLINTORY_LOCAL_LLM_ENABLED == 'true'
        id: enrichment
        run: |
          set +e
          uv run glintory enrich run --json > build/state/enrichment_metadata.json
          cmd_exit_code=$?
          set -e

          if [ ! -s build/state/enrichment_metadata.json ]; then
            echo "{\"operational_status\": \"failed\", \"selected_count\": 0, \"succeeded_count\": 0, \"failed_count\": 0, \"skipped_count\": 0, \"warning_codes\": [\"LLM_INFERENCE_FAILED\"]}" > build/state/enrichment_metadata.json
          fi

          cat build/state/enrichment_metadata.json

          status=$(jq -r '.operational_status' build/state/enrichment_metadata.json)
          selected=$(jq -r '.selected_count // 0' build/state/enrichment_metadata.json)
          succeeded=$(jq -r '.succeeded_count // 0' build/state/enrichment_metadata.json)
          failed=$(jq -r '.failed_count // 0' build/state/enrichment_metadata.json)
          skipped=$(jq -r '.skipped_count // 0' build/state/enrichment_metadata.json)
          warnings=$(jq -r '.warning_codes | join(", ")' build/state/enrichment_metadata.json)

          {
            echo "enrichment_status=$status"
            echo "enrichment_selected=$selected"
            echo "enrichment_succeeded=$succeeded"
            echo "enrichment_failed=$failed"
            echo "enrichment_skipped=$skipped"
            echo "enrichment_warnings=$warnings"
          } >> "$GITHUB_OUTPUT"

      - name: Write Actions Summary
        run: |
          echo "### Glintory Scheduled Automation Summary" >> $GITHUB_STEP_SUMMARY
          echo "- **Collection Status:** ${{ steps.collection.outputs.collection_status }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Collection Succeeded Count:** ${{ steps.collection.outputs.succeeded_count }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Collection Failed Count:** ${{ steps.collection.outputs.failed_count }}" >> $GITHUB_STEP_SUMMARY

      - name: Write LLM Enrichment Summary
        if: env.GLINTORY_LOCAL_LLM_ENABLED == 'true'
        run: |
          echo "- **LLM Enabled:** ${{ env.GLINTORY_LOCAL_LLM_ENABLED }}" >> $GITHUB_STEP_SUMMARY
          echo "- **LLM Model:** ${{ env.GLINTORY_LOCAL_LLM_MODEL_FILE }}" >> $GITHUB_STEP_SUMMARY
          echo "- **LLM Revision:** ${{ env.GLINTORY_LOCAL_LLM_MODEL_REVISION }}" >> $GITHUB_STEP_SUMMARY
          echo "- **LLM Selected Count:** ${{ steps.enrichment.outputs.enrichment_selected }}" >> $GITHUB_STEP_SUMMARY
          echo "- **LLM Succeeded Count:** ${{ steps.enrichment.outputs.enrichment_succeeded }}" >> $GITHUB_STEP_SUMMARY
          echo "- **LLM Failed Count:** ${{ steps.enrichment.outputs.enrichment_failed }}" >> $GITHUB_STEP_SUMMARY
          echo "- **LLM Skipped Count:** ${{ steps.enrichment.outputs.enrichment_skipped }}" >> $GITHUB_STEP_SUMMARY
          echo "- **LLM Warning Codes:** ${{ steps.enrichment.outputs.enrichment_warnings }}" >> $GITHUB_STEP_SUMMARY

      - name: Generate public static site
        run: |
          uv run glintory publish build \
            --output-dir dist \
            --base-path /glintory \
            --site-url "$GLINTORY_PUBLIC_SITE_URL" \
            --json

      - name: Create state snapshot and upload
        id: upload_state
        run: |
          uv run python scripts/github_state_store.py --state-dir .state --db-url "$GLINTORY_DATABASE_URL" upload-and-verify --metadata-file build/state/scheduler_metadata.json
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GLINTORY_GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure Pages
        uses: actions/configure-pages@983d7736d9b0ae728b81ab479565c72886d7745b # v5.0.0

      - name: Upload Pages Artifact
        uses: actions/upload-pages-artifact@56afc609e74202658d3ffba0e8f6dda462b719fa # v3.0.1
        with:
          path: dist

  deploy-pages:
    needs: automation
    permissions:
      pages: write
      id-token: write
      contents: read
    outputs:
      page_url: ${{ steps.deployment.outputs.page_url }}
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Deploy GitHub Pages
        id: deployment
        uses: actions/deploy-pages@d6db90164ac5ed86f2b6aed7e0febac5b3c0c03e # v4.0.5

  notify:
    needs:
      - automation
      - deploy-pages
    if: ${{ always() }}
    permissions:
      contents: read
      issues: write
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout codebase
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Setup Python
        uses: actions/setup-python@39cd14951b08e74b54015e9e001cdefcf80e669f # v5.1.1
        with:
          python-version: '3.12'

      - name: Run notifier
        env:
          AUTOMATION_RESULT: ${{ needs.automation.result }}
          DEPLOY_PAGES_RESULT: ${{ needs.deploy-pages.result }}
          COLLECTION_STATUS: ${{ needs.automation.outputs.collection_status }}
          STARTED_AT: ${{ needs.automation.outputs.started_at }}
          RESTORED_ASSET_NAME: ${{ needs.automation.outputs.restored_asset_name }}
          RESTORED_ASSET_ID: ${{ needs.automation.outputs.restored_asset_id }}
          UPLOADED_ASSET_NAME: ${{ needs.automation.outputs.uploaded_asset_name }}
          UPLOADED_ASSET_ID: ${{ needs.automation.outputs.uploaded_asset_id }}
          PRUNED_DELETED_COUNT: ${{ needs.automation.outputs.pruned_deleted_count || '0' }}
          PRUNE_STATUS: ${{ needs.automation.outputs.prune_status }}
          DATABASE_SIZE: ${{ needs.automation.outputs.database_size }}
          SOURCE_COUNT: ${{ needs.automation.outputs.source_count || '0' }}
          SIGNAL_COUNT: ${{ needs.automation.outputs.signal_count || '0' }}
          OPPORTUNITY_COUNT: ${{ needs.automation.outputs.opportunity_count || '0' }}
          PAGES_DEPLOYMENT_RESULT: ${{ needs.deploy-pages.result }}
          PAGES_URL: ${{ needs.deploy-pages.outputs.page_url }}
          DUE_COUNT: ${{ needs.automation.outputs.due_count || '0' }}
          SUCCEEDED_COUNT: ${{ needs.automation.outputs.succeeded_count || '0' }}
          PARTIAL_COUNT: ${{ needs.automation.outputs.partial_count || '0' }}
          FAILED_COUNT: ${{ needs.automation.outputs.failed_count || '0' }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python scripts/github_issue_notifier.py \
            --automation-result "$AUTOMATION_RESULT" \
            --deploy-pages-result "$DEPLOY_PAGES_RESULT" \
            --collection-status "$COLLECTION_STATUS" \
            --started-at "$STARTED_AT" \
            --restored-asset-name "$RESTORED_ASSET_NAME" \
            --restored-asset-id "$RESTORED_ASSET_ID" \
            --uploaded-asset-name "$UPLOADED_ASSET_NAME" \
            --uploaded-asset-id "$UPLOADED_ASSET_ID" \
            --pruned-deleted-count "$PRUNED_DELETED_COUNT" \
            --prune-status "$PRUNE_STATUS" \
            --database-size "$DATABASE_SIZE" \
            --source-count "$SOURCE_COUNT" \
            --signal-count "$SIGNAL_COUNT" \
            --opportunity-count "$OPPORTUNITY_COUNT" \
            --pages-deployment-result "$PAGES_DEPLOYMENT_RESULT" \
            --pages-url "$PAGES_URL" \
            --due-count "$DUE_COUNT" \
            --succeeded-count "$SUCCEEDED_COUNT" \
            --partial-count "$PARTIAL_COUNT" \
            --failed-count "$FAILED_COUNT"
