name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout codebase
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Setup Python
        uses: actions/setup-python@39cd14951b08e74b54015e9e001cdefcf80e669f # v5.1.1
        with:
          python-version: '3.12'

      - name: Set up uv
        uses: astral-sh/setup-uv@885a0ca0c0827282b0e9ff9d6ad7a68e82ef62d9 # v5.3.0
        with:
          version: "0.5.21"

      - name: Set Temporary Database URL
        run: |
          echo "GLINTORY_DATABASE_URL=sqlite:///$RUNNER_TEMP/glintory-ci.sqlite3" >> "$GITHUB_ENV"

      - name: UV Lock Check
        run: |
          uv lock --check

      - name: Install dependencies
        run: |
          uv sync --frozen

      - name: CLI Help Check
        run: |
          uv run glintory --help

      - name: Ruff Check
        run: |
          uv run ruff check .

      - name: Ruff Format Check
        run: |
          uv run ruff format --check .

      - name: Pyright Check
        run: |
          uv run pyright

      - name: Run actionlint
        uses: shogo82148/actions-actionlint@c7e91244fbf922883015f606bf93ec8eb8bb1fb9 # v1.23.0

      - name: Run Pytest
        run: |
          uv run pytest -W error

      - name: Alembic Upgrade Head
        run: |
          uv run alembic upgrade head

      - name: Alembic Check
        run: |
          uv run alembic check

      - name: Alembic Current Check
        run: |
          uv run alembic current

      - name: Alembic Downgrade
        run: |
          uv run alembic downgrade -1

      - name: Alembic Re-upgrade
        run: |
          uv run alembic upgrade head
